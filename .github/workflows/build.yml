name: iOS UEDumper Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks/tmp_sdks
          mv $THEOS/sdks/tmp_sdks/*.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks/tmp_sdks

      - name: Patch KittyMemory & Build
        run: |
          # ldid yolunu sisteme tanıtıyoruz
          export PATH=$THEOS/bin:$PATH
          
          # KittyMemory hata düzeltmesi
          sed -i '' 's/MemoryPatch::createWithBytes(fileName, /MemoryPatch::createWithBytes(/g' deps/KittyMemory/KittyMemory/writeData.hpp
          
          cd Tweak
          make clean
          # ldid'yi Theos içinden kullanması için zorluyoruz
          make package FINALPACKAGE=1 THEOS_DEVICE_IP=
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-UEDumper-Build
          path: |
            Tweak/packages/*.deb
            Tweak/.theos/obj/*.dylib
