name: Build Theos Tweak DEB with Artifact

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot rsync curl perl unzip git libplist-utils libncurses6 libncurses-dev zlib1g-dev

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/theos/sdks
          theos-sdks-branch: master
          orion: false

      - name: Build the DEB package
        working-directory: ./Tweak
        run: |
          make clean
          make package FINALPACKAGE=1
          ls -la packages/ || echo "No packages found - check Makefile/control"

      - name: Upload DEB as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper_DEB
          path: Tweak/packages/*.deb
          if-no-files-found: error
          retention-days: 7

      - name: Upload build logs (for debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            Tweak/*.log
            Tweak/theos.log  # varsa
