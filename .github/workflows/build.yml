name: Build Theos Tweak DEB on macOS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos dependencies (macOS zaten hazır ama emin olalım)
        run: |
          brew install ldid make libplist || true  # zaten varsa hata verme

      - name: Theos'u kur (action ile)
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          orion: false

      - name: SDK'leri manuel indir ve extract et (action hatasını bypass)
        run: |
          cd theos
          curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
          unzip master.zip -d sdks_temp
          mv sdks_temp/sdks-master/* sdks/ || mv sdks_temp/* sdks/  # extracted folder sdks-master olabilir
          rm -rf sdks_temp master.zip
          ls -la sdks/  # debug: SDK'ler var mı bak

      - name: DEB paketini build et
        working-directory: ./Tweak
        run: |
          export THEOS=../theos  # Theos path'i set et
          make clean || true
          make package FINALPACKAGE=1
          ls -la packages/ || echo "packages klasöründe .deb yok - Makefile/control kontrol et"

      - name: DEB artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper_DEB_macOS
          path: Tweak/packages/*.deb
          if-no-files-found: warn
          retention-days: 7

      - name: Debug log'larını artifact olarak yükle (her zaman)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs-macOS
          path: |
            Tweak/*.log
            theos/*.log
            Tweak/packages/*.log
