name: Build Theos Tweak DEB with Artifact

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Actions sekmesinden manuel çalıştır

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (submodules dahil)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Ubuntu 24.04 dependencies kur (libtinfo5 alternatifi)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential fakeroot rsync curl perl unzip git libplist-utils libncurses6 libncurses-dev zlib1g-dev

      - name: Theos ortamını kur
        uses: Randomblock1/theos-action@v1
        with:
          theos-dir: theos
          theos-src: https://github.com/theos/theos
          theos-sdks: https://github.com/theos/sdks
          theos-sdks-branch: master
          orion: false

      - name: DEB paketini build et
        working-directory: ./Tweak
        run: |
          make clean || true  # clean hata verse bile devam
          make package FINALPACKAGE=1
          ls -la packages/ || echo "packages klasöründe .deb yok - Makefile/control kontrol et"

      - name: DEB artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: iOS_UEDumper_DEB
          path: Tweak/packages/*.deb
          if-no-files-found: warn  # hata yerine uyarı ver, log'ları incele
          retention-days: 7

      - name: Debug log'larını artifact olarak yükle (her zaman)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-logs
          path: |
            Tweak/*.log
            Tweak/theos.log
            Tweak/packages/*.log
