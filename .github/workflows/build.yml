name: iOS UEDumper Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          rm -rf $THEOS # Temiz kurulum garantisi
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install iOS SDK
        run: |
          mkdir -p $THEOS/sdks
          # En yaygın kullanılan iOS 14.5 SDK'sını çekiyoruz (Hızlı yöntem)
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build Project
        run: |
          # Projenin Makefile'ına göre derleme yapıyoruz
          make clean
          make package FINALPACKAGE=1

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-UEDumper-Package
          path: packages/*.deb
