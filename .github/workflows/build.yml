name: iOS UEDumper Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          rm -rf $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          echo "$THEOS/bin" >> $GITHUB_PATH

      - name: Install iOS SDK
        run: |
          # SDK klasörünü temizle ve oluştur
          mkdir -p $THEOS/sdks
          # Sadece en güncel commit'i çekerek (depth 1) tüm SDK'ları hızlıca indiriyoruz
          # Git clone, curl'deki yönlendirme hatalarını önler
          git clone --depth 1 https://github.com/theos/sdks.git $THEOS/sdks/tmp_sdks
          # Gereken SDK'yı ana klasöre taşı (Örn: 14.5)
          mv $THEOS/sdks/tmp_sdks/*.sdk $THEOS/sdks/
          rm -rf $THEOS/sdks/tmp_sdks

      - name: Build Project
        run: |
          # Makefile içindeki SDK ayarlarını kontrol eder ve derler
          make clean
          make package FINALPACKAGE=1

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iOS-UEDumper-Package
          path: packages/*.deb
